<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found - Return to Abraham Ada & Esther Kemi's wedding website" />
  <title>Page Not Found - Abraham Ada & Esther Kemi</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #8b4513 0%, #6b3410 50%, #9d5c28 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Montserrat", sans-serif;
      color: #fff;
      padding: 2rem;
    }

    .error-container {
      text-align: center;
      max-width: 600px;
      animation: fadeInUp 1s ease;
    }

    .error-icon {
      font-size: 120px;
      margin-bottom: 2rem;
      color: #DAA520;
      opacity: 0.9;
    }

    .error-code {
      font-size: 5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      font-family: "Cormorant Garamond", serif;
      letter-spacing: -2px;
      line-height: 1;
    }

    .error-title {
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .error-message {
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 3rem;
      opacity: 0.95;
    }

    .error-links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: #DAA520;
      color: #8b4513;
      text-decoration: none;
      border-radius: 0;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      border: 2px solid #DAA520;
    }

    .error-btn:hover {
      background: transparent;
      color: #DAA520;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(218, 165, 32, 0.3);
    }

    .error-btn-secondary {
      background: transparent;
      color: #fff;
      border-color: #fff;
    }

    .error-btn-secondary:hover {
      background: #fff;
      color: #8b4513;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    @media (max-width: 768px) {
      .error-code {
        font-size: 3.5rem;
      }

      .error-title {
        font-size: 1.8rem;
      }

      .error-message {
        font-size: 1rem;
      }

      .error-links {
        flex-direction: column;
      }

      .error-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon">
      <i class="fas fa-map"></i>
    </div>
    <h1 class="error-code">404</h1>
    <h2 class="error-title">Page Not Found</h2>
    <p class="error-message">
      We couldn't find the page you're looking for. Perhaps you entered a wrong URL, or this page couldn't be found or processed on the server. Please try again later.
    </p>
    <div class="error-links">
      <a href="/" class="error-btn">Back to Home</a>
      <a href="/our-story" class="error-btn error-btn-secondary">Our Story</a>
    </div>
  </div>
</body>
</html>
